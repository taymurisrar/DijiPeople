appId: com.dijipeople.agent
productName: DijiPeople Agent
artifactName: DijiPeople-Agent-Setup-${version}.${ext}

directories:
  output: release

files:
  - dist/**/*
  - package.json


win:
  target:
    - nsis
  signAndEditExecutable: false

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

publish:
  provider: generic
  url: "${env.DIJIPEOPLE_AGENT_UPDATE_URL}"