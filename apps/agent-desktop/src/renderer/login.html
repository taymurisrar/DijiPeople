<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DijiPeople Agent</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f8fb;
        color: #172033;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        width: min(340px, calc(100vw - 48px));
      }

      h1 {
        margin: 0 0 6px;
        font-size: 24px;
        font-weight: 700;
      }

      p {
        margin: 0 0 24px;
        color: #667085;
        font-size: 14px;
        line-height: 1.45;
      }

      label {
        display: block;
        margin-bottom: 14px;
        color: #344054;
        font-size: 13px;
        font-weight: 600;
      }

      input {
        width: 100%;
        margin-top: 6px;
        border: 1px solid #d0d5dd;
        border-radius: 8px;
        padding: 11px 12px;
        background: #ffffff;
        color: #172033;
        font-size: 14px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 8px;
        padding: 12px 14px;
        background: #1769e0;
        color: white;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .error {
        min-height: 20px;
        margin: 12px 0 0;
        color: #b42318;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DijiPeople Agent</h1>
      <p>Sign in once to start your work session on this device.</p>
      <form id="login-form">
        <label>
          Email
          <input
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            required
          />
        </label>
        <label>
          Password
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </label>
        <button id="submit" type="submit">Sign in</button>
        <div id="error" class="error" aria-live="polite"></div>
      </form>
    </main>
    <script src="./login.js"></script>
  </body>
</html>
