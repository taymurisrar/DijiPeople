services:
  - type: web
    name: dijipeople-api
    env: node
    plan: starter
    buildCommand: npm ci && npm --workspace api run build
    startCommand: npm --workspace api run start:prod
    preDeployCommand: npm --workspace api run release
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: API_ORIGIN
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AUTH_COOKIE_DOMAIN
        sync: false
